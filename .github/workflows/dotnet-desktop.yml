name: Continuous Integration

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore LunarROMCorruptor.sln
      working-directory: ./LunarROMCorruptor

    - name: Build
      run: dotnet build LunarROMCorruptor.sln --configuration Release --no-restore
      working-directory: ./LunarROMCorruptor

    - name: Test
      run: dotnet test LunarROMCorruptor.sln --no-build --verbosity normal
      working-directory: ./LunarROMCorruptor
